<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>養豚現場相談AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="logo-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M19,10c-0.2,0-0.3,0.1-0.5,0.2c0.2-0.5,0.4-1.1,0.5-1.7C19.1,7.2,18.1,6,16.8,6H16c-0.6,0-1.1,0.5-1.1,1c0,0.4,0.2,0.7,0.5,0.9 C14.2,7,12.7,6.5,11,6.5C8,6.5,5.2,8.2,3.9,10.8C3.8,11,3.2,11.2,3,11.3C2.4,11.6,2,12.2,2,12.9v1.6c0,2,1.3,3.7,3.1,4.3 C5,19,5.5,19.2,6,19.6C6.6,20.2,7.3,21,8,21c0.9,0,1.5-0.7,1.8-1.5c0.3-0.8,0.7-1.1,1.2-1.1c0.5,0,0.9,0.3,1.2,1.1 C12.5,20.3,13.1,21,14,21c0.7,0,1.4-0.8,2-1.4c0.5-0.4,1-0.6,1.2-0.8c0.8-0.3,1.5-0.7,2.1-1.3l1.8-1.8L19,10z"/></svg>
                PigAI
            </h1>
            <p class="subtitle">養豚現場の異変をAIに相談</p>
        </header>

        <main class="main-content">
            <section class="input-section dark-card">
                <form id="consult-form" class="consult-form">
                    <div class="category-section">
                        <label class="section-label">どんな様子ですか？</label>
                        <p class="category-title">カテゴリ</p>
                        <div class="category-grid" id="category-grid">
                            <button type="button" class="category-item" data-category="症状"><div class="cat-icon">🌡️</div><span>症状</span></button>
                            <button type="button" class="category-item" data-category="環境変化"><div class="cat-icon">❄️💧</div><span>環境変化</span></button>
                            <button type="button" class="category-item" data-category="食い落ち"><div class="cat-icon">🐷🍱</div><span>食い落ち</span></button>
                            <button type="button" class="category-item" data-category="下痢"><div class="cat-icon">💩</div><span>下痢</span></button>
                            <button type="button" class="category-item" data-category="咳"><div class="cat-icon">🗣️</div><span>咳</span></button>
                            <button type="button" class="category-item urgent" data-category="死亡増"><div class="cat-icon">🚨</div><span>死亡増</span></button>
                        </div>
                    </div>

                    <div class="input-focus-group">
                        <label for="consult-text" class="section-label">状況を入力してください</label>
                        <textarea id="consult-text" class="modern-textarea" placeholder="いつから？どの豚房で？"></textarea>
                    </div>

                    <div class="actions-row">
                        <div class="file-attachment-wrapper">
                            <label for="consult-image" class="file-btn glass-btn">
                                <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></span>
                                <span class="btn-text">写真を添付</span>
                            </label>
                            <input type="file" id="consult-image" accept="image/*" class="is-hidden">
                            <span id="file-name" class="file-name-display truncate"></span>
                        </div>
                    </div>

                    <div class="guideline-box outline-box">
                        <ul class="guideline-list">
                            <li>※農場名等は入力しないでください。</li>
                            <li>※識別子等が写り込む画像は避けてください。</li>
                        </ul>
                    </div>

                    <div class="submit-wrapper">
                        <p class="urgent-warning">※緊急時は直ちに獣医師へご連絡ください。</p>
                        <!-- type="submit" を確実にする -->
                        <button type="submit" id="submit-btn" class="primary-btn" disabled>
                            <span>AIに相談する</span>
                        </button>
                    </div>
                </form>
            </section>

            <section id="status-area" class="is-hidden">
                <div id="loading" class="loading-state dark-card">
                    <div class="modern-spinner"><div></div><div></div><div></div><div></div></div>
                    <p class="loading-text">状況を整理中...</p>
                </div>
                <div id="error-message" class="error-state is-hidden dark-card">
                    <div class="error-content">
                        <p id="error-text">通信に失敗しました。</p>
                        <button id="retry-btn" class="outline-btn mt-4">再試行</button>
                    </div>
                </div>
            </section>

            <section id="result-area" class="is-hidden">
                <div class="result-surface dark-card">
                    <div class="result-header"><h2 class="result-title">AIの確認結果</h2></div>
                    <div class="result-body">
                        <div class="urgency-bar">
                            <div class="urgency-badge" id="res-urgency"></div>
                            <div id="res-vet-alert" class="vet-alert is-hidden"><span id="res-vet-msg"></span></div>
                        </div>
                        <div class="insight-block primary-insight">
                            <h3 class="block-title">まず確認すべきこと</h3>
                            <ul id="res-actions" class="action-list"></ul>
                        </div>
                        <div class="insight-block secondary-insight">
                            <h3 class="block-title">理由</h3>
                            <p id="res-reason" class="text-body"></p>
                        </div>
                        <details class="modern-details mt-6">
                            <summary class="details-summary"><span>追加でわかるとよい情報</span></summary>
                            <div class="details-content"><ul id="res-optional" class="optional-list"></ul></div>
                        </details>
                    </div>
                    <div class="result-footer"><button id="reset-btn" class="secondary-btn w-full">新たに相談する</button></div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
